<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS Quiz — Hệ Điều Hành</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:#2a2a3d;--accent:#7c6fff;--accent2:#ff6b9d;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--text:#e8e8f0;--muted:#6b6b85;--card-glow:0 0 40px rgba(124,111,255,0.12)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,111,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,111,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .container{max-width:860px;margin:0 auto;padding:40px 24px 80px;position:relative;z-index:1}
  .header{text-align:center;margin-bottom:48px;animation:fadeDown 0.6s ease both}
  .tag{display:inline-block;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);padding:4px 12px;border-radius:2px;margin-bottom:16px}
  h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1.1;background:linear-gradient(135deg,#fff 30%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
  .header p{color:var(--muted);font-size:15px;font-family:'Space Mono',monospace}
  .stats-bar{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap}
  .stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-family:'Space Mono',monospace;font-size:12px;flex:1;text-align:center;min-width:70px}
  .stat-chip .val{display:block;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:2px}
  .stat-chip .lbl{color:var(--muted);font-size:10px;letter-spacing:1px}
  .progress-wrap{margin-bottom:32px}
  .progress-top{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:8px}
  .progress-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}
  .question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;margin-bottom:24px;box-shadow:var(--card-glow);animation:slideIn 0.4s ease both;position:relative;overflow:hidden}
  .question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .q-number{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;margin-bottom:16px;text-transform:uppercase}
  .q-text{font-size:17px;font-weight:600;line-height:1.6;color:var(--text);margin-bottom:28px;white-space:pre-wrap}
  .multi-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;background:rgba(124,111,255,0.15);color:var(--accent);border:1px solid rgba(124,111,255,0.3);padding:2px 8px;border-radius:4px;margin-bottom:16px}
  .options{display:flex;flex-direction:column;gap:10px}
  .option-btn{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.2s ease;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14.5px;font-weight:500;line-height:1.5;width:100%}
  .option-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,111,255,0.08);transform:translateX(4px)}
  .option-btn.selected{border-color:var(--accent);background:rgba(124,111,255,0.12)}
  .option-btn.correct{border-color:var(--green);background:rgba(74,222,128,0.1)}
  .option-btn.wrong{border-color:var(--red);background:rgba(248,113,113,0.1)}
  .option-btn.reveal-correct{border-color:var(--green);background:rgba(74,222,128,0.07)}
  .option-letter{display:flex;align-items:center;justify-content:center;width:28px;height:28px;min-width:28px;border-radius:6px;background:var(--border);font-family:'Space Mono',monospace;font-size:12px;font-weight:700;transition:all 0.2s}
  .option-btn.selected .option-letter{background:var(--accent);color:#fff}
  .option-btn.correct .option-letter{background:var(--green);color:#000}
  .option-btn.wrong .option-letter{background:var(--red);color:#fff}
  .option-btn.reveal-correct .option-letter{background:var(--green);color:#000}
  .option-icon{margin-left:auto;font-size:16px;min-width:20px;text-align:right}
  .explanation{margin-top:20px;padding:16px 18px;background:rgba(124,111,255,0.07);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-family:'Space Mono',monospace;font-size:12.5px;color:#a0a0c0;line-height:1.7;display:none}
  .explanation.show{display:block;animation:fadeUp 0.3s ease}
  .controls{display:flex;gap:12px;margin-top:24px}
  .btn{padding:14px 28px;border-radius:10px;border:none;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
  .btn-primary{background:var(--accent);color:#fff;flex:1}
  .btn-primary:hover{background:#9488ff;transform:translateY(-1px)}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border)}
  .btn-secondary:hover{border-color:var(--accent)}
  .result-screen{text-align:center;animation:fadeUp 0.6s ease both;display:none}
  .result-screen.show{display:block}
  .result-emoji{font-size:72px;margin-bottom:16px;display:block;animation:bounce 0.6s ease}
  .result-score{font-size:clamp(3rem,8vw,5rem);font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
  .result-label{font-family:'Space Mono',monospace;color:var(--muted);font-size:14px;margin-bottom:32px}
  .result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:40px}
  .result-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
  .result-item .big{font-size:2rem;font-weight:800;margin-bottom:4px}
  .result-item .small{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px}
  .result-item.c .big{color:var(--green)}
  .result-item.w .big{color:var(--red)}
  .result-item.s .big{color:var(--yellow)}
  .rank-badge{display:inline-block;padding:8px 24px;border-radius:100px;font-weight:800;font-size:18px;margin-bottom:32px}
  .review-header{text-align:left;font-size:20px;font-weight:800;margin:48px 0 20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .review-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:12px}
  .review-item.r-correct{border-left:3px solid var(--green)}
  .review-item.r-wrong{border-left:3px solid var(--red)}
  .review-q{font-size:14px;font-weight:600;margin-bottom:10px;line-height:1.5;display:flex;gap:10px}
  .review-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);white-space:nowrap;margin-top:2px}
  .review-answers{display:flex;gap:8px;flex-wrap:wrap}
  .review-ans{padding:3px 10px;border-radius:4px;font-size:11px;font-family:'Space Mono',monospace}
  .review-ans.user-right{background:rgba(74,222,128,0.15);color:var(--green)}
  .review-ans.user-wrong{background:rgba(248,113,113,0.15);color:var(--red)}
  .review-ans.correct-ans{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.3)}
  .welcome-screen{text-align:center;animation:fadeUp 0.5s ease both}
  .welcome-screen.hide{display:none}
  .options-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:32px 0}
  .mode-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:20px 12px;cursor:pointer;transition:all 0.2s}
  .mode-card:hover,.mode-card.active{border-color:var(--accent);background:rgba(124,111,255,0.08)}
  .mode-card .icon{font-size:28px;margin-bottom:8px;display:block}
  .mode-card .name{font-weight:700;font-size:14px;margin-bottom:4px}
  .mode-card .desc{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
  @keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
  @media(max-width:600px){.question-card{padding:24px 16px}.controls{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="tag">// HỆ ĐIỀU HÀNH</div>
    <h1>OS Quiz</h1>
    <p>Operating Systems — Ôn tập trắc nghiệm</p>
  </div>

  <div class="welcome-screen" id="welcomeScreen">
    <p style="color:var(--muted);font-family:'Space Mono',monospace;font-size:13px;margin-bottom:4px;">Chọn số câu hỏi</p>
    <p style="color:var(--accent);font-family:'Space Mono',monospace;font-size:12px;margin-bottom:24px;" id="totalInfo"></p>
    <div class="options-grid" id="modeGrid">
      <div class="mode-card active" data-count="10"><span class="icon">⚡</span><div class="name">10 câu</div><div class="desc">Quick</div></div>
      <div class="mode-card" data-count="20"><span class="icon">🎯</span><div class="name">20 câu</div><div class="desc">Standard</div></div>
      <div class="mode-card" data-count="30"><span class="icon">🔥</span><div class="name">30 câu</div><div class="desc">Challenge</div></div>
      <div class="mode-card" data-count="50"><span class="icon">💪</span><div class="name">50 câu</div><div class="desc">Hard</div></div>
      <div class="mode-card" data-count="0"><span class="icon">💀</span><div class="name">Tất cả</div><div class="desc">Full exam</div></div>
    </div>
    <button class="btn btn-primary" id="startBtn" style="min-width:200px">Bắt đầu →</button>
  </div>

  <div id="quizSection" style="display:none">
    <div class="stats-bar">
      <div class="stat-chip"><span class="val" id="statCurrent">1</span><span class="lbl">HIỆN TẠI</span></div>
      <div class="stat-chip"><span class="val" id="statTotal">—</span><span class="lbl">TỔNG</span></div>
      <div class="stat-chip"><span class="val" id="statCorrect" style="color:var(--green)">0</span><span class="lbl">ĐÚNG</span></div>
      <div class="stat-chip"><span class="val" id="statWrong" style="color:var(--red)">0</span><span class="lbl">SAI</span></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top"><span id="progressLabel">Câu 1</span><span id="progressPct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="question-card" id="questionCard">
      <div class="q-number" id="qNumber">QUESTION 01</div>
      <div class="q-text" id="qText"></div>
      <div id="multiBadge"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="explanation" id="explanation"></div>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" id="skipBtn">Bỏ qua</button>
      <button class="btn btn-primary" id="submitBtn" disabled>Xác nhận</button>
      <button class="btn btn-primary" id="nextBtn" style="display:none">Câu tiếp →</button>
    </div>
  </div>

  <div class="result-screen" id="resultScreen">
    <span class="result-emoji" id="resultEmoji">🎉</span>
    <div class="result-score" id="resultScore">—</div>
    <div class="result-label" id="resultLabel"></div>
    <div id="rankBadge" class="rank-badge"></div>
    <div class="result-grid">
      <div class="result-item c"><div class="big" id="rCorrect">0</div><div class="small">ĐÚNG</div></div>
      <div class="result-item w"><div class="big" id="rWrong">0</div><div class="small">SAI</div></div>
      <div class="result-item s"><div class="big" id="rSkip">0</div><div class="small">BỎ QUA</div></div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-secondary" id="reviewBtn">Xem lại đáp án</button>
      <button class="btn btn-primary" id="restartBtn">Làm lại</button>
    </div>
    <div id="reviewSection" style="display:none">
      <div class="review-header">📋 Chi tiết đáp án</div>
      <div id="reviewList"></div>
    </div>
  </div>
</div>

<script>
const Q=[ {q:"Which of the following is NOT a function of an operating system?",o:["A. Resource Management","B. Process Management","C. Memory Management","D. Transistors Management"],a:["D"]},{q:"What is the primary purpose of an operating system?",o:["A. To execute application programs.","B. To provide a user-friendly interface.","C. To manage hardware resources and provide services to software.","D. To create computer games."],a:["C"]},{q:"Which statement is FALSE about operating systems?",o:["A. Operating System is a type of system software","B. Operating System is a type of application","C. The Operating System as an Extended Machine","D. The Operating System as a Resource Manager"],a:["B"]},{q:"Select the correct statement from the following options.",o:["A. Mouse is unique tool to interface between user and computer","B. Windows OS does not provide a work in network environment.","C. The Windows OS is viewed as an object that performs tasks.","D. The Windows OS has a graphical interface."],a:["D"]},{q:"A key concept in all operating systems is the ____.",o:["A. Files","B. Process","C. Input/Output","D. The Shell"],a:["B"]},{q:"In the operating system zoo, what is the main priority of time-sharing system over a multiprogramming system?",o:["A. The cost of managing smaller processes","B. Increase the CPU's performance","C. Response time is smaller","D. Reduce the burst time of the process"],a:["C"]},{q:"An operating system is the ______ system because these systems are characterized by having time as a key parameter.",o:["A. Real-time","B. Handheld","C. Multiprocessor","D. None of other choice"],a:["A"]},{q:"In the first generation of computers, what operating system did users use?",o:["A. This stage does not have an operating system.","B. Users use the FM operating system.","C. Users use the OS/360 operating system.","D. Users use the UNIX operating system."],a:["A"]},{q:"Which early operating system was designed for the UNIVAC I computer?",o:["A. MS-DOS","B. UNIX","C. COBOL","D. EDVAC"],a:["D"]},{q:"Which of the following is NOT a part of the operating system?",o:["A. Performance monitor","B. Input/output control program","C. Job control program","D. Supervisor"],a:["A"]},{q:"Which of the following is an Operating System component?",o:["A. Process Management","B. Speed Management","C. Space Management","D. Time Management"],a:["A"]},{q:"The CPU's simple model of instructions retrieved from memory and run is:",o:["A. Fetch, decode, and execute","B. Fetch, execute, and decode","C. Decode, fetch, and execute","D. Execute, decode, and fetch"],a:["A"]},{q:"What is the purpose of a pipeline in a CPU?",o:["A. To increase speed by executing multiple stages of instructions simultaneously.","B. To reduce the number of instructions in the program.","C. To combine all instructions into one operation.","D. To execute instructions randomly."],a:["A"]},{q:"______ is programmed at the factory and cannot be changed afterward.",o:["A. RAM","B. ROM","C. EEPROM","D. CMOS"],a:["B"]},{q:"Main memory is usually called _____.",o:["A. RAM","B. ROM","C. EEPROM","D. CMOS"],a:["A"]},{q:"This register contains condition code bits, CPU priority, mode (user or kernel), and control bits. It is called the:",o:["A. All of the above","B. IR (Instruction Register)","C. PC (Program Counter)","D. PSW (Program Status Word)"],a:["D"]},{q:"What special registers are visible to the programmer? (Choose all correct)",o:["A. MAR (Memory address register)","B. Program counter","C. Stack pointer","D. PSW (Program Status Word)"],a:["B","C","D"],m:true},{q:"The ENIAC had 18,000 vacuum tubes and consumed ______ watts of power.",o:["A. 1,400,000","B. 140,000","C. 14,000","D. 1,400"],a:["B"]},{q:"The ______ was invented to attach slow I/O devices (keyboard, mouse) to the computer.",o:["A. ISA","B. PCI","C. DMI","D. USB"],a:["D"]},{q:"Main advantage of multiprocessor systems?",o:["A. Increase throughput","B. Decrease throughput","C. Low-speed communication","D. Reduced reliability"],a:["A"]},{q:"In what scenario would a microkernel-based OS be advantageous over monolithic?",o:["A. When direct hardware access is necessary for user applications","B. When isolation between user and kernel space is crucial","C. When a layered approach complicates system performance","D. When centralized system control is required"],a:["B"]},{q:"Compare monolithic and client-server OS structures. Which is correct?",o:["A. Monolithic systems integrate all functionalities into a single layer, whereas client-server systems distribute across multiple components.","B. Monolithic systems promote scalability better than client-server systems.","C. Client-server systems offer more efficient communication between components.","D. Monolithic systems have a modular architecture that simplifies maintenance."],a:["A"]},{q:"A simple structuring model for a monolithic system consists of:",o:["A. Main procedure","B. Service procedures","C. Utility procedures","D. All of the above"],a:["D"]},{q:"What is NOT a main feature of a monolithic system?",o:["A. Information hiding: Every procedure is hidden from every other procedure.","B. The operating system runs as a single program in kernel mode.","C. The operating system is organized as a hierarchy.","D. The OS is written as a collection of procedures linked together."],a:["C"]},{q:"What is the purpose of the TRAP instruction in the execution of a system call?",o:["A. To switch from user mode to kernel mode.","B. To call a function from the library.","C. To determine a specific address in memory for the kernel.","D. To check the input parameters before execution."],a:["A"]},{q:"What is NOT an operating system mode?",o:["A. System mode","B. User mode","C. Kernel mode","D. Supervisor mode"],a:["A"]},{q:"What is the purpose of the Kernel in an OS structure?",o:["A. To provide a user-friendly interface.","B. To manage hardware resources and provide services to software.","C. To store user data and files.","D. To control the display and graphics of the user interface."],a:["B"]},{q:"In which OS is the system call for voluntary process termination referred to as ExitProcess?",o:["A. UNIX","B. Windows","C. macOS","D. Linux"],a:["B"]},{q:"If a system requires efficient process handling and termination, which system calls are essential?",o:["A. Process creation and termination","B. File reading and writing","C. Directory management","D. Miscellaneous system calls"],a:["A"]},{q:"What is a process in the context of computer systems?",o:["A. A sequence of activities carried out by an operating system.","B. A method of scheduling CPU tasks for optimal performance.","C. A method of scheduling CPU tasks including registers and variables.","D. An instance of an executing program, including the current values of the program counter, registers, and variables."],a:["D"]},{q:"In computer operating systems, how are processes understood?",o:["A. A program saved on disk.","B. A program is loaded into memory and the CPU is executing.","C. A program loads into primary or secondary memory.","D. A program loaded on disk."],a:["B"]},{q:"What are the basic states of a process?",o:["A. Running, Ready, and Blocked","B. Running, Blocked, and Exit","C. Create, Running, and Exit","D. Create, Running, and Blocked"],a:["A"]},{q:"What triggers a transition from the 'Blocked' state to the 'Ready' state?",o:["A. Completion of an I/O operation","B. User input request","C. Process termination","D. CPU scheduler selection"],a:["A"]},{q:"Which process state transition is ILLEGAL?",o:["A. Ready → Blocked","B. Running → Blocked","C. Blocked → Ready","D. Running → Ready"],a:["A"],x:"A process cannot go directly from Ready to Blocked — it must run first."},{q:"In the Windows OS, which is true about the blocked state of a process?",o:["A. Waiting for an event triggered by the CPU's scheduling mechanism","B. Waiting for an event that has not happened yet","C. Waiting to I/O and waiting for an event that has not happened yet","D. The CPU and Memory are waiting for other events"],a:["C"]},{q:"What are the four main events that cause processes to be created?",o:["A. System initialization.","B. Execution of a process-creation system call by a running process.","C. System that interacts with users and performs work for them.","D. A user request to create a new process.","E. Initiation of a batch job."],a:["A","B","D","E"],m:true},{q:"Which of the following is a voluntary reason for process termination?",o:["A. Fatal error","B. Error exit","C. Killed by another process","D. System crash"],a:["B"]},{q:"Which action does the OS take to execute a new process?",o:["A. Provide immediate CPU for process.","B. Deliver the resources must be process.","C. Create immediate PCB blocks for process.","D. Provide immediate Register for process."],a:["C"]},{q:"What is the primary purpose of process control blocks (PCBs)?",o:["A. To display information about running processes on the screen.","B. To store the user's program and data.","C. To maintain information about each process, including its state, program counter, and CPU registers.","D. To allocate memory for new processes."],a:["C"]},{q:"In Unix, which system call creates the new process?",o:["A. create","B. fork","C. new","D. exec"],a:["B"]},{q:"Processes in UNIX have memory divided into three segments. The third one (besides Data and Stack) is ______.",o:["A. Text segment","B. Heap segment","C. Program segment","D. None of these above"],a:["A"]},{q:"If a process fails, most operating systems write the error information to a ______",o:["A. new file","B. old file","C. another running process","D. log file"],a:["D"]},{q:"In Linux, the command ps -aux gives the equivalent of what in MS-Windows?",o:["A. Start/shutdown.","B. Start/Run input CMD.","C. Open program Task Manager.","D. Open Add/Remove program."],a:["C"]},{q:"What is the main difference between a process and a thread?",o:["A. Threads share the same memory space, while processes do not","B. Processes are faster than threads","C. Processes can only execute one task, while threads execute multiple tasks","D. Threads are independent of processes"],a:["A"]},{q:"Which best describes the relationship between threads within a single process?",o:["A. Threads are completely independent and do not share any resources.","B. Threads share the same memory space but have their own registers.","C. Threads are separate and isolated from one another.","D. Threads are tightly integrated, and they all have their own separate memory space."],a:["B"]},{q:"Which best describes the difference between a process and a thread in Windows?",o:["A. A process contains multiple threads and shares resources, while a thread is an independent execution unit within a process.","B. A process is a program in execution, while a thread is a sequence of instructions that can execute independently.","C. A process and a thread are essentially the same in Windows OS.","D. A process represents system resources, while a thread is responsible for user interface interactions."],a:["A"]},{q:"How do threads enable efficient resource sharing?",o:["A. By allowing threads to share resources within the same address space","B. By isolating resources for each thread","C. By restricting access to shared resources","D. By creating separate address spaces for each thread"],a:["A"]},{q:"Compare threads in user space vs kernel. Which statement is correct?",o:["A. Threads in user space offer faster context switching, whereas kernel threads have direct access to hardware resources.","B. Kernel threads provide better synchronization mechanisms compared to user space threads.","C. User space threads allow for better multitasking performance, while kernel threads are more prone to deadlocks.","D. User space threads have limited access to system resources, whereas kernel threads can efficiently manage I/O operations."],a:["A"]},{q:"When threads are managed in user space, what does each process need to track them?",o:["A. User space table","B. Kernel table","C. Thread table","D. Process table"],a:["C"]},{q:"What is the purpose of the pthread_join function in Pthreads?",o:["A. To create and initialize a thread's attribute structure","B. To wait for a specific thread to exit","C. To release the CPU and let another thread run","D. To terminate the calling thread"],a:["B"]},{q:"What is Interprocess Communication (IPC)?",o:["A. allows processes to communicate and synchronize when using the same address space","B. allows processes to communicate and synchronize their actions","C. allows the processes only to synchronize their actions without communication","D. allows the processes only to communicate without synchronizing"],a:["B"]},{q:"Message passing system allows processes to ______",o:["A. communicate with each other without sharing the same address space","B. communicate with one another by resorting to shared data","C. share data","D. name the recipient or sender of the message"],a:["A"]},{q:"What defines a critical section in Windows?",o:["A. A section of code where the processor gives priority to execute multiple threads simultaneously.","B. A section of code where hardware interrupts are disabled.","C. A segment of code that only one thread can execute at a time to avoid data inconsistency.","D. A part of the kernel where system-level processes are given higher priority."],a:["C"]},{q:"When using Critical Regions solution, which condition is NOT necessary?",o:["A. Processes entering critical regions must set their speed or number of CPUs.","B. Two processes are not in critical regions at the same time.","C. A process outside the staging area must not prevent other processes from entering.","D. Processes do not have to wait indefinitely to enter critical regions."],a:["A"]},{q:"Which best describes a 'race condition'?",o:["A. Multiple processes access and manipulate shared data concurrently","B. A process is stuck in an infinite loop","C. A process waits indefinitely for an event","D. A process exceeds its allocated memory"],a:["A"]},{q:"What problem does using semaphores help solve in the Producer-Consumer scenario?",o:["A. Deadlock","B. Lost-wakeup problem","C. Process termination","D. Memory allocation"],a:["B"]},{q:"IPC primitives role in solving synchronization problems:",o:["A. IPC primitives significantly improve system stability by eliminating all potential deadlock scenarios.","B. While IPC primitives address synchronization issues, they might introduce overhead and scalability challenges.","C. IPC primitives have minimal impact on system stability but greatly enhance performance.","D. The usage of IPC primitives enhances system scalability without any performance trade-offs."],a:["B"]},{q:"In the Dining Philosophers problem, what do the philosophers represent?",o:["A. Real-world philosophers dining in a restaurant.","B. Concurrent processes that compete for access to shared resources.","C. Philosophical concepts unrelated to computing.","D. A form of computer virus."],a:["B"]},{q:"The dining philosophers problem demonstrates that shared resources managed by semaphores/mutexes can lead to:",o:["A. Need for thread priorities in deadlock resolution.","B. Prevention of deadlocks by allowing multiple processes to access critical sections simultaneously.","C. Deadlock situations without proper synchronization.","D. Ineffective resolution of scheduling issues."],a:["C"]},{q:"In 1965, Dijkstra posed and then solved a synchronization problem he called ____.",o:["A. the dining philosophers problem","B. the ostrich algorithm","C. the banker's algorithm","D. the allocation algorithm"],a:["A"]},{q:"Which part of the OS is responsible for deciding which process should run and for how long?",o:["A. CPU Scheduler","B. Disk Scheduler","C. Memory Manager","D. File System","E. Network Manager"],a:["A"]},{q:"Which scheduling algorithm allocates the CPU first to the process that requests it first?",o:["A. First-come, first-served scheduling","B. Shortest job scheduling","C. Priority scheduling","D. Multi-level queue"],a:["A"]},{q:"Which algorithm operates in preemptive scheme only in batch systems?",o:["A. First Come First Served","B. Shortest Job First","C. Round Robin","D. Priority"],a:["C"]},{q:"Which is NOT a scheduling algorithm in Batch Systems?",o:["A. First-Come, First-Served","B. Shortest Job First","C. Shortest Remaining Time Next","D. Round-Robin"],a:["D"],x:"Round-Robin is for interactive systems, not batch systems."},{q:"A preemptive version of SJF is ___.",o:["A. Shortest Process Next","B. First-Come, First-Served","C. Shortest remaining time next","D. Shortest used time"],a:["C"]},{q:"The interval from the time of submission of a process to the time of completion is termed as ______",o:["A. waiting time","B. turnaround time","C. response time","D. throughput"],a:["B"]},{q:"In batch systems, which goal maximizes the number of jobs completed per hour?",o:["A. Throughput","B. Turnaround time","C. CPU utilization","D. Fairness"],a:["A"]},{q:"In interactive systems, what does 'proportionality' refer to?",o:["A. Ensuring processes get an equal share of CPU time","B. Meeting users' expectations in terms of performance","C. Completing as many jobs as possible in a given time frame","D. Predicting how the system will behave under load"],a:["B"]},{q:"In Round-Robin scheduling, what happens when a process runs out of its time slice?",o:["A. The process switches from running to a ready state.","B. The process switches from running to a blocked state.","C. The process switches from running to a suspended-ready state.","D. The process switches from running to a suspended state."],a:["A"]},{q:"FCFS Scheduling: processes arrive in order P2, P3, P1. Burst: P1=24, P2=3, P3=3. Average waiting time?",o:["A. 3","B. 30","C. 27","D. 9","E. 6","F. 2"],a:["A"],x:"P2 waiting=0, P3 waiting=3, P1 waiting=6 → Total=9, Average=9/3=3"},{q:"SJF Scheduling: P1=10, P2=1, P3=2, P4=4, P5=5 (all at time 0). Average waiting time?",o:["A. 4.6","B. 6.2","C. 5.2","D. 4.2"],a:["A"],x:"Order: P2,P3,P4,P5,P1. Waiting: 0,1,3,7,12 → Sum=23, Avg=4.6"},{q:"With ______ only one process can execute at a time. With ______ more than one process can run simultaneously.",o:["A. Multiprocessing, Multiprogramming","B. Multiprogramming, Uniprocessing","C. Multiprogramming, Multiprocessing","D. Uniprogramming, Multiprocessing"],a:["D"]},{q:"4GB RAM, OS occupies 2GB. Processes are 1024MB each, idle 50% for I/O. CPU utilization?",o:["A. 75%","B. 90%","C. 1%","D. 50%"],a:["A"],x:"Available=2GB→2 processes. Utilization=1-(0.5)²=75%"},{q:"What is the role of the Memory Management Unit (MMU)?",o:["A. The MMU translates virtual addresses into physical addresses","B. It controls the allocation of memory to different processes.","C. It manages the paging and swapping of memory pages.","D. It is a data structure used in OS for virtual memory management"],a:["A"]},{q:"What memory management technique uses a binary representation where each bit corresponds to an allocation unit?",o:["A. Bitmap","B. Linked List","C. Paging","D. Partition"],a:["A"]},{q:"The ______ swaps processes in and out of the memory.",o:["A. CPU","B. CPU manager","C. Memory manager","D. User"],a:["C"]},{q:"______ searches the entire list, from beginning to end, and takes the smallest hole that is adequate.",o:["A. Best fit","B. Next fit","C. Worst fit","D. First fit"],a:["A"]},{q:"Memory holes: 16MB,4MB,12MB,28MB,9MB,22MB,12MB,18MB. Which hole for 12MB request using WORST FIT?",o:["A. 18 MB","B. 28 MB","C. 12 MB","D. 16 MB"],a:["B"],x:"Worst Fit selects the largest hole: 28 MB."},{q:"When a higher priority process swaps out a lower priority process, this variant is called?",o:["A. roll out, roll in","B. priority swapping","C. pull in, push out","D. pull out, push in"],a:["A"]},{q:"A general solution to provide many completely independent address spaces is called?",o:["A. Segment","B. Paging","C. Partition","D. Virtual"],a:["D"]},{q:"Given Base and Limit Registers: P1=8KB, P2=4KB, P3=16KB. Base and Limit for P3?",o:["A. Base: 8KB, Limit: 24KB","B. Base: 8KB, Limit: 28KB","C. Base: 12KB, Limit: 16KB","D. Base: 12KB, Limit: 28KB"],a:["D"],x:"P3 starts at 12KB. Limit=12+16=28KB."},{q:"Free memory: 10KB,4KB,15KB,18KB,7KB,9KB,13KB,20KB. Process needing 12KB is placed into 20KB block. Which algorithm?",o:["A. Worst-fit","B. First-fit","C. Best-fit","D. Next-fit"],a:["A"],x:"Worst-fit places the process into the largest available hole."},{q:"Memory blocks B1-B6: 300,600,380,200,750,125 KB. Processes P1-P5: 115,500,350,200,375 KB. Best-fit for P5 (375KB)?",o:["A. B5 (750KB)","B. B3 (380KB)","C. B4 (200KB)","D. B2 (600KB)"],a:["B"],x:"Best-fit: smallest block ≥ 375KB. B3=380KB is the best fit."},{q:"What is the purpose of a segment table in a segmented memory system?",o:["A. To store the contents of disk pages","B. To map segment numbers to physical addresses","C. To manage CPU cache memory","D. To control input/output operations"],a:["B"]},{q:"What is the primary advantage of segmented memory over paging?",o:["A. Simplified address translation","B. Efficient use of memory space","C. Reduced overhead in memory management","D. Elimination of fragmentation"],a:["B"]},{q:"What is the DISADVANTAGE of segmentation in memory management?",o:["A. It can have external fragmentation.","B. The average segment size is larger than the actual page size.","C. It is easier to relocate segments than the entire address space.","D. The segment table is smaller as compared to the page table."],a:["A"]},{q:"In virtual memory, a solution adopted in the 1960s was to split programs into pieces called ____.",o:["A. overlays","B. pages","C. page table","D. page fault"],a:["A"]},{q:"What is paging in virtual memory?",o:["A. A technique for managing disk storage","B. A method for managing memory by dividing it into fixed-size blocks","C. A process for controlling CPU scheduling","D. A mechanism for handling network communication"],a:["B"]},{q:"Most virtual memory systems use a technique called ______?",o:["A. Page Fault","B. Page Frames","C. Page Table","D. Paging"],a:["D"]},{q:"What is the benefit of using paging in virtual memory systems?",o:["A. Enhanced CPU performance","B. Improved disk storage management","C. Efficient memory utilization","D. Faster network communication"],a:["C"]},{q:"What technique is NOT used in the implementation of Virtual Memory?",o:["A. Paging","B. Mapping","C. Segmentation","D. Partition"],a:["D"]},{q:"Which statement best describes virtual memory in Windows?",o:["A. Virtual memory stores temporary files to free up physical RAM.","B. Virtual memory allows a larger address space than physical memory, using RAM and hard disk.","C. Virtual memory is a reserved area on the hard disk for storing system files.","D. Virtual memory enables the OS to manage display settings for multiple monitors."],a:["B"]},{q:"What is the primary goal of a page replacement algorithm?",o:["A. To increase the speed of the CPU","B. To minimize disk I/O operations","C. To increase the number of processes in memory","D. To simplify memory management"],a:["B"]},{q:"The percentage of times a page number is found in the TLB is known as _______",o:["A. miss ratio","B. miss percent","C. hit ratio","D. hit percent"],a:["C"]},{q:"When there is a large logical address space, the best way of paging would be _______",o:["A. not to page","B. a two-level paging algorithm","C. the page table itself","D. a single-level paging algorithm"],a:["B"]},{q:"A multilevel page table is preferred over a single level page table because ______.",o:["A. it helps reduce the number of page faults in page replacement algorithms","B. it is required by the translation lookaside buffer","C. it helps reduce the size of page table needed to implement the virtual address space","D. it reduces the memory access time to read or write a memory location"],a:["C"]},{q:"What is the primary disadvantage of using a fixed-size page table?",o:["A. It limits the number of pages a process can have.","B. It results in excessive memory consumption.","C. It requires a complex page replacement algorithm.","D. It leads to inefficient page allocation."],a:["B"]},{q:"What is another name for the Modified Bit?",o:["A. Referenced Bit","B. Access Bit","C. Dirty Bit","D. Clear Bit"],a:["C"]},{q:"In a paging system, data stored in secondary storage not currently in main memory is called:",o:["A. Cache","B. Page table","C. Disk image","D. Swap space"],a:["D"]},{q:"Which information bit in the page table entry indicates the types of access permitted?",o:["A. Present/absent bit","B. Caching disabled","C. Protection bit","D. Modified bit"],a:["C"]},{q:"In the FIFO page replacement algorithm, what data structure is commonly used?",o:["A. Stack","B. Queue","C. Linked list","D. Array"],a:["B"]},{q:"Main advantage of the Clock Algorithm over the Second Chance Algorithm?",o:["A. The Clock algorithm eliminates the need to move pages around, reducing overhead.","B. The Clock algorithm increases the complexity of implementation.","C. The Clock algorithm guarantees fewer page faults compared to Second Chance algorithm.","D. The Clock algorithm uses more memory to maintain the circular structure."],a:["A"]},{q:"In which page replacement algorithm can the page fault rate increase even when the number of frames increases?",o:["A. FIFO","B. LRU","C. NRU","D. OPT"],a:["A"],x:"This is known as Belady's Anomaly."},{q:"In the context of virtual memory, what does 'thrashing' refer to?",o:["A. When a process is spending more time paging than executing","B. When a process is terminated unexpectedly","C. When a process is using more memory than allocated","D. When a process is waiting for I/O operations"],a:["A"]},{q:"Assume 16-bit virtual address and 4-KB page size. How many indexes in a one-level page table?",o:["A. 16","B. 4","C. 8","D. 64"],a:["A"],x:"4KB=2^12 offset bits, 16-12=4 bits for page number → 2^4=16 indexes"},{q:"32-bit address, two-level page table: 10-bit PT1, 12-bit PT2, remaining offset. Page size?",o:["A. 512B","B. 1-KB","C. 2-KB","D. 4-KB"],a:["B"],x:"Offset=32-10-12=10 bits → 2^10=1024 bytes=1KB"},{q:"Virtual address 0x00403008, split 10-bit PT1, 10-bit PT2, 12-bit offset. Find PT1, PT2, offset.",o:["A. PT1=1; PT2=3; offset=8","B. PT1=1; PT2=1; offset=8","C. PT1=4; PT2=3; offset=8","D. PT1=4; PT2=1; offset=8"],a:["A"],x:"0x00403008 binary: PT1=0000000001=1, PT2=0000000011=3, offset=0000 0000 1000=8"},{q:"Evaluate memory virtualization in optimizing resource allocation:",o:["A. It effectively isolates processes, leading to a reduction in overall system performance.","B. It enhances resource allocation efficiency, improving system performance.","C. It complicates memory management, decreasing performance.","D. It only impacts I/O performance, not overall system performance."],a:["B"]},{q:"What is segmentation with paging?",o:["A. A technique for managing multiple memory segments simultaneously.","B. A method that combines the flexibility of segmentation with the efficiency of paging.","C. A scheme that uses fixed-size pages to allocate memory.","D. A scheduling algorithm for thread management."],a:["B"]},{q:"When is the page table created for a new process in a paging system?",o:["A. process creation time.","B. process execution time.","C. page fault time.","D. process termination time."],a:["A"]},{q:"LRU with 3 frames, reference string: 4,7,6,1,7,6,1,2,7,2. Total page faults?",o:["A. 2","B. 4","C. 6","D. 7"],a:["C"],x:"4F,7F,6F,1F(rep4),7H,6H,1H,2F(rep7),7F(rep6),2H → 6 faults"},{q:"FIFO with 3 frames, reference string: 1,2,3,4,1,2. Page faults?",o:["A. 6","B. 4","C. 5","D. 3"],a:["A"],x:"1F,2F,3F,4F(rep1),1F(rep2),2F(rep3) → 6 page faults"},{q:"FIFO with 3 frames, string 1,2,3,4,1,2,5. When page 5 is loaded, which page is replaced?",o:["A. Page 1","B. Page 2","C. Page 3","D. Page 4"],a:["D"],x:"Sequence: 1F,2F,3F,4F(rep1),1F(rep2),2F(rep3),5F(rep4)"},{q:"Optimal replacement with 4 frames, reference string: 7,0,1,2,0,3,0. Page faults?",o:["A. 5","B. 6","C. 4","D. 7"],a:["A"],x:"7F,0F,1F,2F,0H,3F(rep7),0H → 5 page faults"},{q:"Files are ______ units of information created by processes.",o:["A. physical","B. logical","C. sequential","D. conditional"],a:["B"]},{q:"Which file is a sequence of bytes organized into blocks understandable by the system's linker?",o:["A. Text file","B. Object file","C. Source file","D. Executable file"],a:["B"]},{q:"What kind of file access did early operating systems provide?",o:["A. Linear access","B. Unsequential access","C. Random access","D. Sequential access"],a:["D"]},{q:"In file access system, what two methods are used to specify where to start reading in random access?",o:["A. Write and Read","B. Write and Seek","C. Read and Seek","D. Read and Write"],a:["C"]},{q:"Which file attribute specifies who can access the file and in what way?",o:["A. Protection","B. Password","C. Creator","D. Owner"],a:["A"]},{q:"Which file extension is used for backup files?",o:["A. bak","B. zip","C. txt","D. o"],a:["A"]},{q:"Which file extension is used for compressed archives?",o:["A. .mpg","B. .bak","C. .zip","D. .gif"],a:["C"]},{q:"In a Unix-like OS, what does the tilde (~) character represent in a path?",o:["A. The home directory of the current user","B. The parent directory","C. The current directory","D. The root directory"],a:["A"]},{q:"What is an absolute path in operating systems?",o:["A. A path that starts from the root directory","B. A path that is relative to the current working directory","C. A path that includes only the file name","D. A path that is used for network communication"],a:["A"]},{q:"How does a relative path differ from an absolute path?",o:["A. Relative paths always start from the root directory","B. Relative paths are shorter than absolute paths","C. Relative paths depend on the current working directory","D. Relative paths contain only file extensions"],a:["C"]},{q:"How would the path usr/ast/mailbox be written in MULTICS?",o:["A. usr\\ast\\mailbox","B. >usr>ast>mailbox","C. /usr/ast/mailbox","D. usr>ast>mailbox"],a:["B"],x:"MULTICS uses the > character as a path separator."},{q:"The simplest form of directory system is having one directory containing all files. It is called the _____",o:["A. Root directory","B. User directory","C. Parent directory","D. Current directory"],a:["A"]},{q:"What file operation should free up internal tablespace when all accesses are completed?",o:["A. Close","B. Delete","C. Append","D. Seek"],a:["A"]},{q:"When a directory has been read, it should be closed using ____.",o:["A. Close","B. Closedir","C. Delete","D. Opendir"],a:["B"]},{q:"Which operation notifies the OS that a file is coming and sets some of its attributes?",o:["A. Delete","B. Create","C. Read","D. Write"],a:["B"]},{q:"In UNIX, which type of file is used to model disks?",o:["A. Regular files.","B. Character special files.","C. Block special files.","D. Directories."],a:["C"]},{q:"In UNIX, how are devices like USB sticks integrated into the file-system hierarchy?",o:["A. Devices are not integrated and require separate access commands","B. Devices are assigned unique identifiers that must be used to access files","C. Devices can be mounted on directories within the file-system hierarchy","D. Devices require special software to be accessed through the file system"],a:["C"]},{q:"In Unix, which command is used to move the file pointer?",o:["A. Write","B. Mount","C. Link","D. Lseek"],a:["D"]},{q:"In file sharing, B links to C's file by creating a new file containing the path name. What type of linking?",o:["A. Synchronous Linking","B. Symbolic Linking","C. Traditional (hard) Linking","D. Synthetic Linking"],a:["B"]},{q:"Which file access method is often used to optimize access to large files?",o:["A. Sequential access","B. Direct access","C. Indexed access","D. Linked access"],a:["C"]},{q:"What is the goal of uniform naming in file and device management?",o:["A. To make file names unique to each device","B. To limit file names to a specific format","C. To differentiate file names based on the device type","D. To ensure the name of a file or device is a simple string or integer, independent of the device"],a:["D"]},{q:"In Linux, what is the primary purpose of the /etc directory?",o:["A. To store temporary files.","B. To manage system boot files.","C. To house system configuration files and scripts.","D. To store user home directories."],a:["C"]},{q:"In Windows, which command is used to create a new directory?",o:["A. Mkdir","B. Rmdir","C. Chdir","D. Chmod"],a:["A"]},{q:"To prevent users from hogging too much disk space, multiuser OSes provide a mechanism called:",o:["A. Disk Quota","B. Allocation Limit","C. Disk Space Limit","D. Disk Allocation Limit"],a:["A"]},{q:"Disk can be divided into partitions. The first block of every partition is called:",o:["A. Boot block","B. Free block","C. Super block","D. MBR"],a:["C"]},{q:"Sector 0 of the disk is called the ____ and is used to boot the computer.",o:["A. DMA","B. MBR","C. FAT","D. NTFS"],a:["B"]},{q:"When the computer is booted, what is used to read in and execute?",o:["A. BIOS, Boot Block","B. CPU, BIOS","C. BIOS, MBR","D. MBR, BIOS"],a:["C"]},{q:"What is fragmentation in file-system implementation?",o:["A. A technique for managing directory structures.","B. The allocation of memory for file storage.","C. The splitting of files or free space into smaller, non-contiguous blocks.","D. The arrangement of files on storage devices."],a:["C"]},{q:"Using a linked list of disk blocks with 1-KB block and 32-bit disk block number, how many addresses can be stored?",o:["A. 255","B. 1024","C. 32","D. 128"],a:["A"],x:"1KB=1024 bytes, each 32-bit address=4 bytes → 1024/4=256, minus 1 management block=255"},{q:"4-TB disk, 4-KB blocks, free-list method. How many block addresses can be stored in one block?",o:["A. 1024 addresses","B. 256 addresses","C. 512 addresses","D. 2048 addresses","E. 128 addresses"],a:["A"],x:"4KB=4096 bytes, each 32-bit address=4 bytes → 4096/4=1024"},{q:"Analyze significance of log-structured file systems:",o:["A. Log-structured file systems optimize disk usage but may suffer from higher write latencies.","B. Log-structured file systems minimize write latencies by writing data in large units and improve disk usage.","C. Log-structured file systems have no impact on write latencies and disk usage.","D. Log-structured file systems slow down disk usage by writing data in small units."],a:["B"]},{q:"In Windows 95, maximum partition size with FAT-16 and 4KB block size?",o:["A. 128MB","B. 256MB","C. 512MB","D. 1024MB"],a:["B"],x:"FAT16: 65536 clusters × 4KB = 256MB"},{q:"In Windows 95, maximum partition size with FAT-32 and 16KB block size?",o:["A. 1TB","B. 2TB","C. 512MB","D. 128MB"],a:["B"]},{q:"In the original IBM PC 360-KB floppy disk, how many sectors per track?",o:["A. 4","B. 8","C. 9","D. 12"],a:["C"]},{q:"Which RAID level provides disk striping WITHOUT fault tolerance?",o:["A. RAID 0","B. RAID 1","C. RAID 2","D. RAID 5","E. RAID 6"],a:["A"]},{q:"RAID levels ______ work with strips and do not require synchronized drives.",o:["A. RAID levels 2 and 3","B. RAID levels 3 and 4","C. RAID levels 4 and 5","D. RAID levels 5 and 6"],a:["C"]},{q:"Weaknesses of RAID 0?",o:["A. Requires the highest number of disks in RAID modes","B. There is no data recovery mechanism","C. The unit of data transmitted is at the BIT level","D. Does not improve read and write speeds"],a:["B"]},{q:"Which OS uses the > symbol as a separator in its file path structure?",o:["A. Windows","B. UNIX","C. MULTICS","D. Linux"],a:["C"]},{q:"The software that talks to an I/O controller, giving it commands and accepting responses, is called ______.",o:["A. device driver","B. DMA","C. device interface","D. interrupt"],a:["A"]},{q:"The hardware mechanism that allows a device to notify the CPU is called ____.",o:["A. interrupt","B. polling","C. driver","D. controlling"],a:["A"]},{q:"An interrupt with four properties (PC saved, all prior instructions completed, no later instructions finished, execution state known) is called?",o:["A. Imprecise interrupt","B. Synchronous interrupt","C. Sequential interrupt","D. Precise interrupt"],a:["D"]},{q:"In computer interrupts, the number on address lines used as an index into a table to fetch a new PC is called:",o:["A. interrupt vector","B. interrupt handler","C. interrupt pointer","D. interrupt executor"],a:["A"]},{q:"What is the purpose of DMA in I/O hardware?",o:["A. To manage device controllers.","B. To allocate memory for device drivers.","C. To enable devices to transfer data to and from memory without CPU intervention.","D. To provide user interfaces for I/O devices."],a:["C"]},{q:"Key advantage of using DMA for data transfer?",o:["A. Increased CPU involvement in data transfers","B. Faster data transfer speeds","C. Limited device compatibility","D. Decreased device control over memory"],a:["B"]},{q:"What types of operations is DMA useful for?",o:["A. Transfers large and fast data between memory and I/O devices.","B. Transfers large and slow data between memory and I/O devices.","C. Transfers slow and small data between memory and I/O devices.","D. Transfers small data between memory and cache."],a:["A"]},{q:"What addresses are typically used by most DMA controllers?",o:["A. Logical memory","B. Abstract memory","C. Virtual memory","D. Physical memory"],a:["D"]},{q:"In DMA transfer cycle, what two modes can many buses operate in?",o:["A. Word-at-a-time mode and byte mode.","B. Word-at-a-time mode and block mode.","C. Word-at-a-time mode and bit mode.","D. Word-at-a-time mode and page mode."],a:["B"]},{q:"In DMA transfer cycle, when the DMA controller tells the device to acquire the bus, perform transfers, then release, this is called:",o:["A. Fly-by mode.","B. Word-at-a-time mode","C. Burst mode","D. Caching mode"],a:["C"]},{q:"I/O units' electronic component is called?",o:["A. Device controller or I/O devices","B. Device controller or adapter","C. Digital or terminal","D. Digital or I/O devices"],a:["B"]},{q:"Besides converting serial bit stream into bytes, what else does the I/O controller do?",o:["A. Perform any error correction necessary","B. Perform convert the sequence bit stream into a block of bytes","C. Perform connecting I/O devices","D. Perform read and write serial bit stream into a block of bytes"],a:["A"]},{q:"______ includes every peripheral unit such as disks, clocks, keyboards, displays, and so on.",o:["A. I/O devices","B. Memory","C. CPU","D. Software"],a:["A"]},{q:"What is a common block size range used in a file system or storage medium?",o:["A. 512 to 8192 bytes","B. 512 to 16384 bytes","C. 512 to 32768 bytes","D. 512 to 65536 bytes"],a:["D"]},{q:"What type of clock keeps track of current time and date and is typically battery-powered?",o:["A. System clock","B. CPU clock","C. Real-time clock (RTC)","D. Network clock"],a:["C"]},{q:"The simplest form of I/O where the CPU does all the work is called:",o:["A. Processed I/O","B. Programmed I/O","C. CPU I/O","D. Memory-mapped I/O"],a:["B"]},{q:"In programmed I/O, who is responsible for managing all aspects of data transfer?",o:["A. The I/O device","B. The DMA controller","C. The CPU","D. The interrupt handler"],a:["C"]},{q:"What are the three basic ways that I/O operations can be performed?",o:["A. Programmed I/O","B. Memory-mapped I/O","C. Interrupt-driven I/O","D. I/O using DMA"],a:["A","C","D"],m:true},{q:"In memory-mapped I/O, to prevent infinite loops while waiting for a device, what is used?",o:["A. Selectively enable caching","B. Selectively disable buffer","C. Selectively enable buffer","D. Selectively disable caching"],a:["D"]},{q:"What is 'blocking' in the context of I/O software?",o:["A. A technique for managing device drivers.","B. A mechanism for ensuring device synchronization.","C. The process of stopping a process until an I/O operation is completed.","D. A method of allocating memory for I/O operations."],a:["C"]},{q:"How many layers are there in the I/O software system?",o:["A. 3","B. 4","C. 5","D. 6"],a:["B"]},{q:"Which is NOT a responsibility of Device-Independent I/O Software layer?",o:["A. Uniform interfacing for device drivers","B. Allocating and releasing dedicated devices","C. Providing a device-independent block size","D. Allocating port numbers to I/O devices","E. Error handling","F. Buffering"],a:["D"]},{q:"What are the four important issues for I/O software?",o:["A. Error handling","B. Device independence","C. Synchronous and Asynchronous","D. Uniform naming","E. Buffering"],a:["A","B","D","E"],m:true},{q:"What happens to characters that arrive while the user buffer page is being brought in from disk?",o:["A. The buffer is full, there is no place to put them","B. The buffer is ready, there are more places to put them","C. The buffer is clear, there are more places to put them"],a:["A"]},{q:"Format of a sector after low-level formatting?",o:["A. The format of a sector is preamble, data and ECC.","B. The format of a sector is preamble, data and cylinder.","C. The format of a sector is preamble and data.","D. The format of a sector is data and ECC."],a:["A"]},{q:"Time to move the arm to the proper cylinder is called?",o:["A. Seek time","B. Rotational delay","C. Actual data transfer time","D. Access time"],a:["A"]},{q:"Which operation in stable storage writes and verifies a block on both drives?",o:["A. Stable read.","B. Crash recovery.","C. Stable write.","D. Data synchronization."],a:["C"]},{q:"Which is NOT one of the usual duties of Clock Software?",o:["A. Maintaining the time of day.","B. Helping processes run longer than they are allowed to.","C. Accounting for CPU usage.","D. Handling the alarm system call made by user processes.","E. Doing profiling, monitoring, and statistics gathering."],a:["B"]},{q:"In disk scheduling, which algorithm is considered the fairest but may lead to high seek times?",o:["A. FCFS","B. SSTF","C. SCAN","D. C-SCAN"],a:["A"]},{q:"SSF disk scheduling: cylinders 98,37,14,65,67 requested, head at 53. What is the order?",o:["A. 53, 65, 67, 37, 14, 98","B. 53, 37, 14, 65, 67, 98","C. 53, 14, 37, 65, 67, 98","D. 53, 98, 67, 65, 37, 14"],a:["A"],x:"From 53: nearest=65(12), then 67(2), then 37(30), then 14(23), then 98(84)"},{q:"Disk head at 53, sequence 53→98→37→14→65→67. Which algorithm is this?",o:["A. FCFS","B. SSF","C. SJF","D. Elevator"],a:["A"]},{q:"Disk head at 53, sequence 53→65→67→98→37→14. Which algorithm is this?",o:["A. Elevator","B. SSF","C. SJF","D. FCFS"],a:["B"]},{q:"SSF scheduling, cylinder 11 in progress, new requests: 1,36,16,34,9,12. Total head movements?",o:["A. 61","B. 111","C. 60","D. 108"],a:["A"],x:"11→12(1),12→9(3),9→16(7),16→1(15),1→34(33),34→36(2) = 61"},{q:"Which ISN'T a method to PREVENT deadlocks?",o:["A. Attacking the Mutual Exclusion Condition","B. Use Banker's Algorithm","C. Attacking the Hold and Wait Condition","D. Attacking the No Preemption Condition","E. Attacking the Circular Wait Condition"],a:["B"],x:"Banker's Algorithm is a deadlock AVOIDANCE technique, not prevention."},{q:"In deadlock, what is the mutual exclusion condition?",o:["A. Processes currently holding resources can request new resources.","B. Resources previously granted cannot be forcibly taken away.","C. There must be a circular list of processes each waiting for a resource held by the next.","D. Each resource is either currently assigned to exactly one process or is available."],a:["D"]},{q:"In deadlock, what is the no-preemption condition?",o:["A. Processes currently holding resources can request new resources.","B. Resources previously granted cannot be forcibly taken away. They must be explicitly released.","C. There must be a circular list of processes waiting for resources.","D. Each resource is assigned to exactly one process."],a:["B"]},{q:"Analyze the significance of the hold-and-wait condition:",o:["A. It allows processes to request resources without considering safety.","B. It dictates that processes must wait for all resources to be available before starting.","C. It can cause processes to indefinitely hold resources while waiting for others, influencing deadlock prevention strategies.","D. It mandates that resources must be released once a process completes."],a:["C"]},{q:"Which condition is described by 'Each resource is either currently assigned to exactly one process or is available'?",o:["A. Mutual exclusion condition","B. Hold-and-wait condition","C. No-preemption condition","D. Circular wait condition"],a:["A"]},{q:"What does 'no preemption' imply in the context of deadlocks?",o:["A. Resources can be preempted from one process to another.","B. Resources cannot be preempted once allocated.","C. Processes can be terminated to free up resources.","D. Resources are allocated in a circular manner."],a:["B"]},{q:"What does a resource allocation graph represent in deadlock detection?",o:["A. A graph that shows the number of resources allocated to each process.","B. A graph that depicts the processes and resources and their relationships.","C. A chart showing the execution order of processes.","D. A diagram of CPU scheduling."],a:["B"]},{q:"An arc directed from a process to a resource in a resource allocation graph means:",o:["A. The process is currently waiting for that resource.","B. The process is currently ready waiting for that resource.","C. The process is currently blocked waiting for that resource.","D. The process is currently running for that resource."],a:["A"]},{q:"If the wait-for graph contains a cycle ______",o:["A. then a deadlock does not exist","B. then a deadlock exists","C. then the system is in a safe state","D. either deadlock exists or the system is in a safe state"],a:["B"]},{q:"What is the primary objective of Deadlock Avoidance techniques?",o:["A. To resolve deadlocks after they occur","B. To preemptively avoid potential deadlocks","C. To require processes to request resources in advance","D. To identify deadlocks and take corrective action","E. To ignore the occurrence of deadlocks"],a:["B"]},{q:"Which algorithm is commonly used to determine if the resource allocation state is safe?",o:["A. Dijkstra's Algorithm","B. Banker's Algorithm","C. Kruskal's Algorithm","D. Floyd-Warshall Algorithm"],a:["B"]},{q:"In the Banker's algorithm, purpose of the 'maximum demand' matrix?",o:["A. To specify the number of instances of each resource currently held by each process.","B. To record the maximum resources each process may need during its execution.","C. To list the resources currently available in the system.","D. To identify deadlocked processes."],a:["B"]},{q:"Who is responsible for the Banker's algorithm?",o:["A. Dijkstra","B. Zobel","C. Newton","D. Ostrich"],a:["A"]},{q:"Which recovery method can lead to data inconsistency when re-executed?",o:["A. Recovery through rollback","B. Killing processes","C. Preemption","D. Checkpointing","E. None of the others"],a:["A"]},{q:"Every time a request for allocation cannot be granted immediately, the detection algorithm identifies ______.",o:["A. the set of processes that have been deadlocked","B. the set of processes in the deadlock queue","C. the specific process that caused the deadlock","D. the set of processes that caused the deadlock"],a:["A"]},{q:"What is a preemptable resource?",o:["A. One that can be taken away from the process owning it with no ill effects","B. One that can be taken away from the process owning it with ill effects","C. One that cannot be taken away from the process owning it with no ill effects","D. One that cannot be taken away from the process owning it with ill effects"],a:["A"]},{q:"What is a nonpreemptable resource?",o:["A. One that can be taken away from its current owner with potentially causing failure.","B. One that cannot be taken away from its current owner with potentially causing failure.","C. One that can be taken away from its current owner without potentially causing failure.","D. One that cannot be taken away from its current owner without potentially causing failure."],a:["D"]},{q:"If a Blu-ray recorder is suddenly taken away from a process, the Blu-ray gets garbled. This indicates:",o:["A. It's an Un-preemptable resource","B. It's a Preemptable resource","C. It's a Non-sharable resource","D. It's a Non-preemptable resource"],a:["D"]},{q:"Which of the following statements regarding deadlock is correct?",o:["A. Allocation is a logical process while acquisition is its physical implementation.","B. Banker's Algorithm is used to guarantee absolute mutual exclusion during resource acquisition.","C. A combination of semaphore and mutex ensures safe resource allocation.","D. Kernel is responsible for exclusive resource acquisition by a process while IPC takes care of safe resource allocation among multiple processes."],a:["D"]},{q:"Which tool is used for both Deadlock Detection & Recovery and Deadlock Avoidance?",o:["A. Resource Request Matrix","B. Resource Allocation Matrix","C. Resource Graph","D. Pie chart"],a:["C"]},{q:"What is the Ostrich algorithm?",o:["A. A deadlock recovery algorithm","B. A deadlock dealing algorithm (pretend there is no deadlock)","C. A deadlock detection algorithm","D. A deadlock avoidance algorithm"],a:["B"]},{q:"A problem closely related to deadlock and livelock is ____",o:["A. Starvation","B. Communication","C. Two-phase locking","D. Prevention"],a:["A"]},{q:"In OS, how does livelock differ from deadlock?",o:["A. In deadlock, processes make progress; in livelock, they do not.","B. In livelock, processes make progress; in deadlock, they do not.","C. Deadlock and livelock are the same.","D. Livelock is the process before becoming deadlock."],a:["B"],x:"In deadlock: processes do not run. In livelock: processes run but make no progress."},{q:"The number of resources requested by a process ______",o:["A. must always be less than the total number of resources available in the system","B. must not exceed the total number of resources available in the system","C. must always be equal to the total number of resources available in the system","D. must exceed the total number of resources available in the system"],a:["B"]},{q:"Which deadlock condition does 'Take resources away' attack?",o:["A. Hold and wait","B. Mutual exclusion","C. No preemption","D. Circular wait"],a:["C"]},{q:"Which condition, if not present, can help prevent deadlocks?",o:["A. Mutual exclusion","B. Hold and wait","C. No preemption","D. Circular wait"],a:["D"]},{q:"Differentiate Type 1 and Type 2 hypervisors. Which is generally more efficient for enterprise environments?",o:["A. Type 1 hypervisors, as they run directly on hardware","B. Type 2 hypervisors, as they offer more flexibility.","C. Type 1 hypervisors, for simpler management than Type 2","D. Both types are equally efficient in enterprises"],a:["A"]},{q:"A VMM (Virtual Machine Monitor) is also known as:",o:["A. Hypovisor","B. hypervisor","C. shell","D. console"],a:["B"]},{q:"In a thin client setup, where is most of the software and data processing performed?",o:["A. Locally on the thin client device.","B. On a central server or cloud infrastructure.","C. On a central server or client infrastructure.","D. On a dedicated network switch."],a:["B"]},{q:"What is the output of: echo $((5 / 2 * 2)) ?",o:["A. 1","B. 5","C. 4","D. 2"],a:["C"],x:"5/2=2 (integer division), 2×2=4"},{q:"In Linux, what key combination stops the ping command in the terminal?",o:["A. Ctrl+Break","B. Ctrl+D","C. Ctrl+C","D. Ctrl+Z"],a:["C"]},{q:"/etc/passwd entry: 'john:x:1002:John Henry::bin/bash'. Choose the correct statement:",o:["A. Username = john and userid = 1002","B. Username = John Henry and userid = 1002","C. Username = john and userid = 1000","D. Username = John Henry and userid = 1000"],a:["A"]},{q:"A logical address is described as:",o:["A. A logical address representing the exact location of data in memory.","B. A logical address generated by the CPU, also known as a virtual address.","C. A logical address translated directly by the MMU.","D. A logical address used by the OS to allocate memory."],a:["B"]},{q:"What is the address that the main memory unit sees and manipulates called?",o:["A. Physical address","B. Address space","C. Physical space","D. Logical address"],a:["A"]},{q:"Which statement accurately describes a page fault in memory paging?",o:["A. A situation where a page is removed from main memory to secondary storage.","B. An error occurring when accessing data that is not present in the page table.","C. A condition when the page table is corrupted due to excessive fragmentation.","D. An interrupt that occurs when accessing a page not currently in main memory."],a:["D"]},{q:"In a file's metadata, what does file size typically represent?",o:["A. The physical size of the storage medium.","B. The number of characters in the file.","C. The number of pages in the file.","D. The amount of space the file occupies on the storage medium."],a:["D"]}];

let questions=[],currentIdx=0,selectedAnswers=[],answered=false,score=0,wrongCount=0,skipCount=0,history=[],chosenCount=10;
const welcomeScreen=document.getElementById('welcomeScreen'),quizSection=document.getElementById('quizSection'),resultScreen=document.getElementById('resultScreen');
document.getElementById('totalInfo').textContent=`Ngân hàng: ${Q.length} câu hỏi`;
document.getElementById('modeGrid').addEventListener('click',e=>{const c=e.target.closest('.mode-card');if(!c)return;document.querySelectorAll('.mode-card').forEach(x=>x.classList.remove('active'));c.classList.add('active');chosenCount=parseInt(c.dataset.count)});
document.getElementById('startBtn').addEventListener('click',()=>{const s=[...Q].sort(()=>Math.random()-0.5);questions=chosenCount===0?s:s.slice(0,Math.min(chosenCount,s.length));welcomeScreen.classList.add('hide');quizSection.style.display='block';document.getElementById('statTotal').textContent=questions.length;currentIdx=0;score=0;wrongCount=0;skipCount=0;history=[];loadQuestion()});
function loadQuestion(){const q=questions[currentIdx];answered=false;selectedAnswers=[];const card=document.getElementById('questionCard');card.style.animation='none';card.offsetHeight;card.style.animation='slideIn 0.4s ease both';document.getElementById('qNumber').textContent=`QUESTION ${String(currentIdx+1).padStart(2,'0')} / ${questions.length}`;document.getElementById('qText').textContent=q.q;const multi=q.m||q.a.length>1;document.getElementById('multiBadge').innerHTML=multi?'<span class="multi-badge">✓ Nhiều đáp án đúng</span>':'';const container=document.getElementById('optionsContainer');container.innerHTML='';q.o.forEach(opt=>{const letter=opt.charAt(0),text=opt.slice(3),btn=document.createElement('button');btn.className='option-btn';btn.innerHTML=`<span class="option-letter">${letter}</span><span style="flex:1">${text}</span><span class="option-icon"></span>`;btn.addEventListener('click',()=>selectOption(btn,letter,multi));container.appendChild(btn)});document.getElementById('explanation').className='explanation';document.getElementById('statCurrent').textContent=currentIdx+1;document.getElementById('statCorrect').textContent=score;document.getElementById('statWrong').textContent=wrongCount;const pct=Math.round(currentIdx/questions.length*100);document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressLabel').textContent=`Câu ${currentIdx+1} / ${questions.length}`;document.getElementById('progressPct').textContent=pct+'%';document.getElementById('submitBtn').disabled=true;document.getElementById('submitBtn').style.display='inline-flex';document.getElementById('nextBtn').style.display='none';document.getElementById('skipBtn').style.display='inline-flex'}
function selectOption(btn,letter,multi){if(answered)return;if(!multi){document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));selectedAnswers=[letter];btn.classList.add('selected')}else{const idx=selectedAnswers.indexOf(letter);if(idx>-1){selectedAnswers.splice(idx,1);btn.classList.remove('selected')}else{selectedAnswers.push(letter);btn.classList.add('selected')}}document.getElementById('submitBtn').disabled=selectedAnswers.length===0}
document.getElementById('submitBtn').addEventListener('click',()=>{if(answered||selectedAnswers.length===0)return;answered=true;const q=questions[currentIdx];const correct=q.a.slice().sort().join('')===selectedAnswers.slice().sort().join('');if(correct)score++;else wrongCount++;history.push({q,selected:[...selectedAnswers],correct});document.querySelectorAll('.option-btn').forEach(btn=>{const letter=btn.querySelector('.option-letter').textContent;const isCorrect=q.a.includes(letter);const isSelected=selectedAnswers.includes(letter);btn.disabled=true;if(isSelected&&isCorrect){btn.classList.add('correct');btn.querySelector('.option-icon').textContent='✓'}else if(isSelected&&!isCorrect){btn.classList.add('wrong');btn.querySelector('.option-icon').textContent='✗'}else if(!isSelected&&isCorrect){btn.classList.add('reveal-correct');btn.querySelector('.option-icon').textContent='✓'}});if(q.x){const el=document.getElementById('explanation');el.textContent='💡 '+q.x;el.classList.add('show')}document.getElementById('statCorrect').textContent=score;document.getElementById('statWrong').textContent=wrongCount;document.getElementById('submitBtn').style.display='none';document.getElementById('skipBtn').style.display='none';document.getElementById('nextBtn').style.display='inline-flex';document.getElementById('nextBtn').textContent=currentIdx<questions.length-1?'Câu tiếp →':'Xem kết quả →'});
document.getElementById('skipBtn').addEventListener('click',()=>{skipCount++;history.push({q:questions[currentIdx],selected:[],correct:false,skipped:true});proceed()});
document.getElementById('nextBtn').addEventListener('click',proceed);
function proceed(){currentIdx++;if(currentIdx>=questions.length)showResult();else loadQuestion()}
function showResult(){quizSection.style.display='none';resultScreen.classList.add('show');const total=questions.length,pct=Math.round(score/total*100);document.getElementById('resultScore').textContent=pct+'%';document.getElementById('resultLabel').textContent=`${score} / ${total} câu đúng`;document.getElementById('rCorrect').textContent=score;document.getElementById('rWrong').textContent=wrongCount;document.getElementById('rSkip').textContent=skipCount;let emoji,rank,rankColor;if(pct>=90){emoji='🏆';rank='XUẤT SẮC';rankColor='linear-gradient(135deg,#fbbf24,#f59e0b)'}else if(pct>=75){emoji='🎉';rank='GIỎI';rankColor='linear-gradient(135deg,#4ade80,#16a34a)'}else if(pct>=60){emoji='👍';rank='KHÁ';rankColor='linear-gradient(135deg,#60a5fa,#2563eb)'}else if(pct>=40){emoji='📚';rank='TRUNG BÌNH';rankColor='linear-gradient(135deg,#fbbf24,#d97706)'}else{emoji='💪';rank='CẦN CỐ GẮNG';rankColor='linear-gradient(135deg,#f87171,#dc2626)'}document.getElementById('resultEmoji').textContent=emoji;const rb=document.getElementById('rankBadge');rb.textContent=rank;rb.style.background=rankColor;rb.style.color='#fff'}
document.getElementById('reviewBtn').addEventListener('click',()=>{const section=document.getElementById('reviewSection'),list=document.getElementById('reviewList');if(section.style.display==='block'){section.style.display='none';return}section.style.display='block';list.innerHTML='';history.forEach((h,i)=>{const div=document.createElement('div');div.className=`review-item ${h.correct?'r-correct':'r-wrong'}`;const qText=h.q.q.length>120?h.q.q.slice(0,120)+'…':h.q.q;let answersHtml='';if(h.skipped){answersHtml='<span class="review-ans user-wrong">Bỏ qua</span>'}else{h.selected.forEach(s=>{const cls=h.q.a.includes(s)?'user-right':'user-wrong';answersHtml+=`<span class="review-ans ${cls}">Chọn: ${s}</span>`});if(!h.correct){h.q.a.forEach(a=>{if(!h.selected.includes(a))answersHtml+=`<span class="review-ans correct-ans">Đúng: ${a}</span>`})}}div.innerHTML=`<div class="review-q"><span class="review-num">Q${i+1}</span><span>${qText}</span></div><div class="review-answers">${answersHtml}</div>`;list.appendChild(div)})});
document.getElementById('restartBtn').addEventListener('click',()=>{currentIdx=0;score=0;wrongCount=0;skipCount=0;history=[];questions=[];resultScreen.classList.remove('show');document.getElementById('reviewSection').style.display='none';welcomeScreen.classList.remove('hide')});
</script>
</body>
</html>
